version: '3.8'

services:
  # ==========================================
  # 0. THE SHIELD (Traefik API Gateway)
  # Purpose: Routes traffic, handles SSL, blocks DDoS.
  # ==========================================
  gateway:
    image: traefik:v2.10
    container_name: vx_gateway
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"      # Where users will eventually connect
      - "8080:8080"  # Traefik Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # ==========================================
  # 1. THE VAULT (PostgreSQL 16)
  # ==========================================
  db:
    image: postgres:16-alpine
    container_name: vx_database
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # No external port exposed. Traefik/PgBouncer handles access. More secure.
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB

  # ==========================================
  # 1.5 THE DATABASE TRAFFIC COP (PgBouncer)
  # Purpose: Converts 1 million user connections into 100 DB connections.
  # ==========================================
  db_pool:
    image: edoburu/pgbouncer
    container_name: vx_db_pooler
    env_file: .env
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 10000
      DEFAULT_POOL_SIZE: 20
    ports:
      - "6432:6432" # Your backend code will talk to THIS port, not 5432
    depends_on:
      - db

  # ==========================================
  # 2. THE BRAIN (Redis)
  # ==========================================
  cache:
    image: redis:7-alpine
    container_name: vx_cache
    env_file: .env
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"

  # ==========================================
  # 2.5 THE SEARCH ENGINE (Elasticsearch)
  # Purpose: Millisecond search across billions of videos.
  # ==========================================
  search:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: vx_search_engine
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    volumes:
      - search_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"

  # ==========================================
  # 3. THE WAREHOUSE (MinIO)
  # ==========================================
  storage:
    image: minio/minio:latest
    container_name: vx_storage
    env_file: .env
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"

  # ==========================================
  # 4. THE CONVEYOR BELT (RabbitMQ)
  # ==========================================
  mq:
    image: rabbitmq:3-management-alpine
    container_name: vx_message_queue
    env_file: .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data:
  redis_data:
  search_data:
  minio_data:
  rabbitmq_data: